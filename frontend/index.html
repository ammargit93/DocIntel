<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>N-ERGY Document Intelligence</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 880px; margin: 30px auto; padding: 0 16px; color: #1a1a1a; }
  h1 { font-size: 22px; }
  .panel { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  button { background: #1a1a1a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type=text] { width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
  .file-row { font-size: 13px; padding: 4px 0; }
  .status-ok { color: #1a7f37; }
  .status-error, .status-empty { color: #c1121f; }
  .answer { white-space: pre-wrap; line-height: 1.5; margin-top: 10px; }
  .citation { background: #f6f6f6; border-left: 3px solid #999; padding: 8px 10px; margin: 6px 0; font-size: 13px; }
  .citation b { color: #333; }
  #stats { font-size: 13px; color: #666; }
  .small { font-size: 12px; color: #888; }
</style>
</head>
<body>
  <h1>📄 N-ERGY Document Intelligence</h1>
  <p class="small">Upload up to 50 PDFs, ask questions, get cited answers. (Optimized for latency: local embeddings + Groq LPU inference.)</p>

  <div class="panel">
    <h3>1. Upload PDFs</h3>
    <input type="file" id="fileInput" multiple accept="application/pdf">
    <button id="uploadBtn">Upload</button>
    <button id="resetBtn" style="background:#999;">Reset index</button>
    <div id="uploadResults"></div>
    <div id="stats"></div>
  </div>

  <div class="panel">
    <h3>2. Ask a question</h3>
    <input type="text" id="questionInput" placeholder="e.g. What were the main findings in Q3?">
    <button id="askBtn">Ask</button>
    <div id="answerBox"></div>
  </div>

  <div class="panel">
    <h3>3. (Bonus) Suggested insights</h3>
    <button id="insightsBtn">Generate insights</button>
    <div id="insightsBox" class="answer"></div>
  </div>

<script>
const $ = id => document.getElementById(id);

async function refreshStats() {
  const r = await fetch('/api/status');
  const d = await r.json();
  $('stats').innerText = `Indexed chunks: ${d.total_chunks}`;
}
refreshStats();

$('uploadBtn').onclick = async () => {
  const files = $('fileInput').files;
  if (!files.length) return alert('Choose at least one PDF.');
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  $('uploadBtn').disabled = true;
  $('uploadResults').innerText = 'Uploading + indexing...';
  try {
    const r = await fetch('/api/upload', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.error) { $('uploadResults').innerText = 'Error: ' + d.error; return; }
    $('uploadResults').innerHTML = d.files.map(f =>
      `<div class="file-row status-${f.status}">${f.filename}: ${f.status}${f.chunks ? ' ('+f.chunks+' chunks)' : ''}${f.message ? ' - '+f.message : ''}</div>`
    ).join('');
    refreshStats();
  } catch (e) {
    $('uploadResults').innerText = 'Upload failed: ' + e;
  } finally {
    $('uploadBtn').disabled = false;
  }
};

$('resetBtn').onclick = async () => {
  await fetch('/api/reset', { method: 'POST' });
  $('uploadResults').innerText = 'Index cleared.';
  $('answerBox').innerHTML = '';
  refreshStats();
};

$('askBtn').onclick = async () => {
  const q = $('questionInput').value.trim();
  if (!q) return;
  $('askBtn').disabled = true;
  $('answerBox').innerHTML = '<p class="small">Thinking...</p>';
  try {
    const r = await fetch('/api/query', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ question: q })
    });
    const d = await r.json();
    if (d.error) { $('answerBox').innerHTML = '<p class="status-error">' + d.error + '</p>'; return; }
    let html = `<div class="answer">${d.answer}</div>`;
    if (d.citations && d.citations.length) {
      html += '<h4>Sources</h4>';
      html += d.citations.map(c =>
        `<div class="citation"><b>[${c.index}] ${c.source}, page ${c.page}</b><br>${c.text}</div>`
      ).join('');
    }
    $('answerBox').innerHTML = html;
  } catch (e) {
    $('answerBox').innerText = 'Query failed: ' + e;
  } finally {
    $('askBtn').disabled = false;
  }
};

$('insightsBtn').onclick = async () => {
  $('insightsBtn').disabled = true;
  $('insightsBox').innerText = 'Generating...';
  try {
    const r = await fetch('/api/insights');
    const d = await r.json();
    $('insightsBox').innerText = d.error || d.insights;
  } finally {
    $('insightsBtn').disabled = false;
  }
};

$('questionInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('askBtn').click(); });
</script>
</body>
</html>
